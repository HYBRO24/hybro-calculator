<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HYBRO TCO Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=DM+Mono:wght@400;500&family=Outfit:wght@700;800&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0D2B4E;--navy-lt:#E8EFF7;--navy-md:#1A4A78;
  --gas:#C4622D;--hp:#1A6FAD;
  --border:#E2E8F0;--bg:#F7F8FA;--text:#1A202C;
  --muted:#64748B;--light:#94A3B8;--white:#FFFFFF;
}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
.header{background:var(--navy);padding:36px 24px 32px;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:-60px;right:-60px;width:280px;height:280px;
  background:rgba(255,255,255,.03);border-radius:50%;pointer-events:none;}
.header-inner{max-width:860px;margin:0 auto;position:relative;}

/* LANG SWITCHER */
.lang-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px;}
.lang-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;cursor:pointer;
  font-family:inherit;font-size:11px;font-weight:700;transition:all .15s;
  border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);color:rgba(255,255,255,.5);}
.lang-btn.active{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.15);color:#fff;}
.lang-flag{font-size:14px;}

.badge{display:inline-block;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.65);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  padding:4px 12px;border-radius:20px;margin-bottom:14px;}
.headline{font-family:'Outfit',sans-serif;font-size:clamp(24px,5vw,42px);font-weight:800;
  color:#fff;line-height:1.1;letter-spacing:-.5px;margin-bottom:10px;}
.headline span{color:#7EB8F7;}
.subheadline{font-size:14px;color:rgba(255,255,255,.5);max-width:520px;line-height:1.65;}

/* WRAP */
.wrap{max-width:860px;margin:0 auto;padding:24px 16px 60px;}

/* CARD */
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px;}

/* SECTION TITLE */
.sec-title{font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--navy);
  display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.sec-line{flex:1;height:1px;background:var(--navy-lt);}

/* LABEL */
.lbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;display:block;}

/* FORM ELEMENTS */
select,input[type=number]{
  width:100%;padding:9px 12px;font-size:14px;font-family:inherit;
  background:var(--white);border:1px solid var(--border);border-radius:8px;
  color:var(--text);outline:none;cursor:pointer;transition:border-color .15s;
}
select:hover,select:focus,input[type=number]:focus{border-color:var(--navy-md);}

/* RANGE */
input[type=range]{
  -webkit-appearance:none;width:100%;height:4px;border-radius:4px;
  outline:none;cursor:pointer;margin-top:8px;
  background:linear-gradient(to right,var(--navy) var(--pct,30%),var(--border) var(--pct,30%));
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;border-radius:50%;
  background:var(--white);border:2px solid var(--navy);
  box-shadow:0 1px 4px rgba(13,43,78,.25);cursor:pointer;
}

/* GRIDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:580px){.g2,.g3{grid-template-columns:1fr;}}

/* TOGGLE */
.toggle-wrap{display:flex;align-items:center;gap:14px;cursor:pointer;margin-bottom:16px;
  border-radius:12px;padding:14px 18px;transition:all .2s;}
.toggle-wrap.on{background:var(--navy-lt);border:1px solid rgba(26,74,120,.27);}
.toggle-wrap.off{background:var(--white);border:1px solid var(--border);}
.toggle-pill{width:44px;height:24px;border-radius:12px;flex-shrink:0;position:relative;transition:background .2s;}
.toggle-pill.on{background:var(--navy);}
.toggle-pill.off{background:var(--border);}
.toggle-dot{position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;
  top:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle-pill.on .toggle-dot{left:23px;}
.toggle-pill.off .toggle-dot{left:3px;}
.toggle-label strong{display:block;font-size:14px;font-weight:700;color:var(--text);}
.toggle-label span{font-size:11px;color:var(--muted);}
.toggle-active{background:var(--navy);color:#fff;font-size:11px;font-weight:700;
  padding:3px 12px;border-radius:20px;white-space:nowrap;margin-left:auto;}

/* AREA DISPLAY */
.area-val{font-family:'Outfit',sans-serif;font-size:34px;font-weight:800;color:var(--navy);
  letter-spacing:-1px;line-height:1;margin-bottom:4px;}
.area-unit{font-size:16px;font-weight:600;color:var(--muted);}
.range-limits{display:flex;justify-content:space-between;font-size:11px;color:var(--light);margin-top:4px;}

/* PROJECT TOGGLE */
.proj-toggle{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--border);
  border-radius:8px;overflow:hidden;}
.proj-btn{padding:10px;font-size:13px;font-family:inherit;border:none;cursor:pointer;
  transition:all .15s;font-weight:400;background:var(--white);color:var(--muted);}
.proj-btn.active{background:var(--navy);color:#fff;font-weight:700;}

/* PANEL INFO */
.panel-info{display:flex;align-items:center;gap:16px;background:var(--navy-lt);
  border:1px solid rgba(13,43,78,.13);border-radius:10px;padding:14px 18px;margin-bottom:16px;}
.panel-num{font-family:'Outfit',sans-serif;font-size:38px;font-weight:800;color:var(--navy);
  line-height:1;min-width:56px;}
.panel-title{font-size:14px;font-weight:700;color:var(--navy);}
.panel-sub{font-size:11px;color:var(--muted);margin-top:2px;}

/* CAPEX CARDS */
.capex-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:18px 20px;}
.capex-label{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:4px;}
.capex-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px;}
.capex-val{font-family:'Outfit',sans-serif;font-size:30px;font-weight:800;
  letter-spacing:-1px;line-height:1;}
.capex-sub{font-size:11px;color:var(--light);margin-top:6px;}

/* OPEX ROWS */
.opex-row{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;background:var(--bg);border-radius:10px;margin-bottom:8px;}
.opex-name{font-size:14px;font-weight:700;color:var(--text);}
.opex-sub{font-size:11px;color:var(--light);font-family:'DM Mono',monospace;margin-top:2px;}
.opex-val{font-family:'DM Mono',monospace;font-size:20px;font-weight:700;
  white-space:nowrap;margin-left:16px;}
.opex-yr{font-size:12px;font-weight:400;color:var(--muted);}

/* CHART */
.chart-wrap{position:relative;height:320px;width:100%;}
.chart-legend{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;
  margin-top:14px;font-size:13px;}
.legend-item{display:flex;align-items:center;gap:6px;}
.legend-dot{width:12px;height:3px;border-radius:2px;}

/* CONCLUSION */
.conclusion{background:var(--navy);border-radius:12px;padding:28px;margin-bottom:16px;}
.concl-title{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:rgba(255,255,255,.4);margin-bottom:14px;}
.concl-text{font-size:16px;line-height:1.8;color:rgba(255,255,255,.82);}
.concl-text .accent{color:#7EB8F7;font-weight:700;}
.concl-text strong{color:#fff;}
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;}
.pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.6);font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;}

/* ADVANCED */
.adv-btn{display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;
  font-size:10px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;
  color:var(--muted);padding:4px 0;margin-bottom:12px;font-family:inherit;}
.adv-arrow{display:inline-block;transition:transform .2s;}
.adv-content{display:none;}
.adv-content.open{display:block;}

/* FOOTER */
.footer{text-align:center;font-size:11px;color:var(--light);margin-top:32px;font-family:'DM Mono',monospace;}

/* TOOLTIP */
#chart-tooltip{
  position:absolute;pointer-events:none;display:none;
  background:#fff;border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;box-shadow:0 4px 16px rgba(0,0,0,.08);font-size:13px;
  font-family:'DM Sans',sans-serif;z-index:10;white-space:nowrap;
}
.tt-year{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);margin-bottom:6px;}
.tt-row{margin-bottom:2px;}
</style>
</head>
<body>

<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div class="lang-bar" id="langBar"></div>
      <div class="badge" id="badge">HYBRO · TCO Calculator</div>
      <h1 class="headline" id="headline"></h1>
      <p class="subheadline" id="subheadline"></p>
    </div>
  </div>

  <div class="wrap">

    <!-- SMART TOGGLE -->
    <div class="toggle-wrap off" id="smartToggle">
      <div class="toggle-pill off" id="togglePill"><div class="toggle-dot"></div></div>
      <div class="toggle-label">
        <strong id="smartLabel"></strong>
        <span id="smartSub"></span>
      </div>
      <div class="toggle-active" id="smartActive" style="display:none"></div>
    </div>

    <!-- PARAMETERS -->
    <div class="card">
      <div class="sec-title"><span id="sectionParams"></span><div class="sec-line"></div></div>

      <div style="margin-bottom:20px">
        <label class="lbl" id="areaLabel"></label>
        <div class="area-val"><span id="areaDisplay">120</span> <span class="area-unit" id="areaUnit"></span></div>
        <input type="range" id="areaSlider" min="50" max="250" step="1" value="120" />
        <div class="range-limits"><span id="areaMin"></span><span id="areaMax"></span></div>
      </div>

      <div class="g2" style="margin-bottom:16px">
        <div>
          <label class="lbl" id="cityLabel"></label>
          <select id="citySelect"></select>
        </div>
        <div>
          <label class="lbl" id="epcLabel"></label>
          <select id="epcSelect"></select>
        </div>
      </div>

      <div>
        <label class="lbl" id="projectLabel"></label>
        <div class="proj-toggle">
          <button class="proj-btn" id="btnRenovation" onclick="setScenario('renovation')"></button>
          <button class="proj-btn active" id="btnNewbuild" onclick="setScenario('newbuild')"></button>
        </div>
      </div>
    </div>

    <!-- CHART -->
    <div class="card">
      <div class="sec-title"><span id="sectionTco"></span><div class="sec-line"></div></div>
      <div class="chart-wrap">
        <canvas id="tcoChart"></canvas>
        <div id="chart-tooltip">
          <div class="tt-year" id="ttYear"></div>
          <div class="tt-row" id="ttGas"></div>
          <div class="tt-row" id="ttHp"></div>
          <div class="tt-row" id="ttHybro"></div>
        </div>
      </div>
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--gas)"></div><span id="legendGas"></span></div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--hp)"></div><span id="legendHp"></span></div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--navy);height:4px"></div><span id="legendHybro">HYBRO</span></div>
      </div>
    </div>

    <!-- PANEL COUNT -->
    <div class="panel-info">
      <div class="panel-num" id="panelNum">—</div>
      <div>
        <div class="panel-title" id="panelsTitle"></div>
        <div class="panel-sub" id="panelsSub"></div>
      </div>
    </div>

    <!-- CAPEX -->
    <div class="card">
      <div class="sec-title"><span id="sectionCapex"></span><div class="sec-line"></div></div>
      <div class="g3">
        <div class="capex-card" style="border-top:3px solid var(--gas)">
          <div class="capex-label" id="gasLabel"></div>
          <div class="capex-name" id="gasName"></div>
          <div class="capex-val" style="color:var(--gas)" id="gasCapexVal"></div>
          <div class="capex-sub" id="gasSub"></div>
        </div>
        <div class="capex-card" style="border-top:3px solid var(--hp)">
          <div class="capex-label" id="hpLabel"></div>
          <div class="capex-name" id="hpName"></div>
          <div class="capex-val" style="color:var(--hp)" id="hpCapexVal"></div>
          <div class="capex-sub" id="hpSub"></div>
        </div>
        <div class="capex-card" style="border-top:3px solid var(--navy)">
          <div class="capex-label" id="hybroLabel"></div>
          <div class="capex-name" id="hybroName"></div>
          <div class="capex-val" style="color:var(--navy)" id="hybroCapexVal"></div>
          <div class="capex-sub" id="hybroSub"></div>
        </div>
      </div>
    </div>

    <!-- OPEX -->
    <div class="card">
      <div class="sec-title"><span id="sectionOpex"></span><div class="sec-line"></div></div>
      <div class="opex-row" style="border-left:3px solid var(--gas)">
        <div><div class="opex-name" id="gasSysName"></div><div class="opex-sub" id="gasSysSub"></div></div>
        <div class="opex-val" style="color:var(--gas)"><span id="gasOpexVal"></span><span class="opex-yr" id="perYear1"></span></div>
      </div>
      <div class="opex-row" style="border-left:3px solid var(--hp)">
        <div><div class="opex-name" id="hpSysName"></div><div class="opex-sub" id="hpSysSub"></div></div>
        <div class="opex-val" style="color:var(--hp)"><span id="hpOpexVal"></span><span class="opex-yr" id="perYear2"></span></div>
      </div>
      <div class="opex-row" style="border-left:3px solid var(--navy)">
        <div><div class="opex-name" id="hybroSysName"></div><div class="opex-sub" id="hybroSysSub"></div></div>
        <div class="opex-val" style="color:var(--navy)"><span id="hybroOpexVal"></span><span class="opex-yr" id="perYear3"></span></div>
      </div>
    </div>

    <!-- CONCLUSION -->
    <div class="conclusion">
      <div class="concl-title" id="conclusionTitle"></div>
      <div class="concl-text" id="conclusionText"></div>
      <div class="pills" id="pillsWrap"></div>
    </div>

    <!-- ADVANCED -->
    <button class="adv-btn" onclick="toggleAdv()">
      <span class="adv-arrow" id="advArrow">▶</span>
      <span id="advBtn"></span>
    </button>
    <div class="adv-content" id="advContent">
      <div class="card">
        <div class="sec-title"><span id="sectionAdv"></span><div class="sec-line"></div></div>
        <div class="g2">
          <div>
            <label class="lbl" id="elecTariffLabel"></label>
            <input type="number" id="elecTariffInput" step="0.01" min="0.05" max="1.0" value="0.35" />
          </div>
          <div>
            <label class="lbl" id="gasTariffLabel"></label>
            <input type="number" id="gasTariffInput" step="0.01" min="0.03" max="0.5" value="0.12" />
          </div>
          <div>
            <label class="lbl" id="copLabel"></label>
            <input type="number" id="copInput" step="0.1" min="2.5" max="4.5" value="3.5" />
          </div>
          <div>
            <label class="lbl" id="inflLabel"></label>
            <input type="number" id="inflInput" step="0.5" min="0" max="10" value="3" />
          </div>
        </div>
      </div>
    </div>

    <div class="footer" id="footer"></div>
  </div>
</div>

// ─── DATA ─────────────────────────────────────────────────────────────────────
const CITIES = {
  berlin:    {deltaT:34,climateMult:1.00,zone:2},
  warsaw:    {deltaT:40,climateMult:1.23,zone:4},
  paris:     {deltaT:25,climateMult:0.77,zone:2},
  london:    {deltaT:23,climateMult:0.77,zone:1},
  madrid:    {deltaT:22,climateMult:0.58,zone:3},
  amsterdam: {deltaT:30,climateMult:1.00,zone:1},
  milan:     {deltaT:25,climateMult:0.92,zone:3},
  vienna:    {deltaT:33,climateMult:1.12,zone:2},
  helsinki:  {deltaT:46,climateMult:1.73,zone:1},
  bucharest: {deltaT:35,climateMult:1.12,zone:4},
};
const ZONE_MULT={1:1.15,2:1.00,3:0.85,4:0.65};
const EPC={A:{bc:50,pw:35},B:{bc:90,pw:50},C:{bc:130,pw:70},D:{bc:170,pw:90},E:{bc:210,pw:110}};
const BASE_CAPEX={renovation:{gas:5000,hp:18000,hl:800},newbuild:{gas:13000,hp:18000,hl:1000}};

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  lang:'en', area:120, cityKey:'paris', epcKey:'C',
  scenario:'newbuild', elecTariff:0.35, gasTariff:0.12,
  cop:3.5, inflationRate:3, useSmartTariff:true,
};

// ─── CALC ─────────────────────────────────────────────────────────────────────
function calculate(){
  const {area,cityKey,epcKey,scenario,elecTariff,gasTariff,cop,inflationRate,useSmartTariff}=state;
  const city=CITIES[cityKey], epc=EPC[epcKey], M=ZONE_MULT[city.zone], base=BASE_CAPEX[scenario];
  const panels=Math.ceil(((epc.pw*(city.deltaT/34))*area/1000)/0.375);
  const hybroC=panels*200+base.hl*M, gasC=base.gas*M, hpC=base.hp*M;
  const demand=area*epc.bc*city.climateMult;
  const gasKwh=demand/0.92, costGas=gasKwh*gasTariff+250*elecTariff+150;
  const hpKwh=demand/cop,   costHp=hpKwh*elecTariff+150;
  const hybroKwh=demand*0.7225, eff=useSmartTariff?elecTariff*0.7:elecTariff, costHybro=hybroKwh*eff;
  const tco=Array.from({length:21},(_,n)=>{
    let g=gasC,h=hpC,b=hybroC;
    for(let y=1;y<=n;y++){const f=Math.pow(1+inflationRate/100,y);g+=costGas*f+(y===12?2000:0);h+=costHp*f;b+=costHybro*f;}
    return{year:n,gas:Math.round(g),hp:Math.round(h),hybro:Math.round(b)};
  });
  const save=hpC-hybroC;
  return{panels,hybroC,gasC,hpC,costGas,costHp,costHybro,hybroKwh,gasKwh,hpKwh,tco,save,yrs:costHybro>0?(save/costHybro).toFixed(1):'—'};
}

  const ctx=document.getElementById('tcoChart').getContext('2d');

  if(chart){chart.destroy();}
  chart=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:t.chartGas,  data:tco.map(d=>d.gas),  borderColor:'#C4622D',borderWidth:2,pointRadius:0,pointHoverRadius:5,tension:0.3},
        {label:t.chartHp,   data:tco.map(d=>d.hp),   borderColor:'#1A6FAD',borderWidth:2,pointRadius:0,pointHoverRadius:5,tension:0.3},
        {label:t.chartHybro,data:tco.map(d=>d.hybro),borderColor:'#0D2B4E',borderWidth:3,pointRadius:0,pointHoverRadius:6,tension:0.3},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          enabled:false,
          external(ctx2){
            const tooltip=ctx2.tooltip;
            const el=document.getElementById('chart-tooltip');
            if(tooltip.opacity===0){el.style.display='none';return;}
            const {offsetLeft:posX,offsetTop:posY}=ctx2.chart.canvas;
            el.style.display='block';
            el.style.left=posX+tooltip.caretX+12+'px';
            el.style.top=posY+tooltip.caretY-20+'px';
            const t2=T[state.lang];
            document.getElementById('ttYear').textContent=t2.tooltipYear(tooltip.dataPoints[0].label);
            const colors=['#C4622D','#1A6FAD','#0D2B4E'];
            ['ttGas','ttHp','ttHybro'].forEach((id,i)=>{
              const dp=tooltip.dataPoints[i];
              document.getElementById(id).innerHTML=`<span style="color:${colors[i]};font-weight:700">${dp.dataset.label}</span>: <strong>${eur(dp.raw)}</strong>`;
            });
          }
        }
      },
      scales:{
        x:{grid:{color:'#E2E8F0'},ticks:{color:'#94A3B8',font:{size:11}},border:{color:'#E2E8F0'}},
        y:{grid:{color:'#E2E8F0'},ticks:{color:'#94A3B8',font:{size:10},callback:v=>`${(v/1000).toFixed(0)}k€`},border:{color:'#E2E8F0'}},
      }
    }
  });
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  const t=T[state.lang], cl=CITY_LABELS[state.lang], r=calculate();

  // LANG BUTTONS
  document.getElementById('langBar').innerHTML=LANGS.map(l=>
    `<button class="lang-btn${state.lang===l.code?' active':''}" onclick="setLang('${l.code}')">
      <span class="lang-flag">${l.flag}</span>${l.label}
    </button>`
  ).join('');

  // HEADER
  document.getElementById('badge').textContent=t.badge;
  document.getElementById('headline').innerHTML=`${t.h1}<br><span>${t.h2}</span>`;
  document.getElementById('subheadline').textContent=t.sub;

  // SMART TOGGLE
  const sw=document.getElementById('smartToggle');
  const pill=document.getElementById('togglePill');
  sw.className='toggle-wrap '+(state.useSmartTariff?'on':'off');
  pill.className='toggle-pill '+(state.useSmartTariff?'on':'off');
  pill.innerHTML='<div class="toggle-dot"></div>';
  document.getElementById('smartLabel').textContent=t.smartLabel;
  document.getElementById('smartSub').textContent=t.smartSub;
  const sa=document.getElementById('smartActive');
  sa.textContent=t.smartActive; sa.style.display=state.useSmartTariff?'block':'none';

  // PARAMETERS
  document.getElementById('sectionParams').textContent=t.sectionParams;
  document.getElementById('areaLabel').textContent=t.areaLabel;
  document.getElementById('areaDisplay').textContent=state.area;
  document.getElementById('areaUnit').textContent=t.areaUnit;
  document.getElementById('areaMin').textContent=t.areaMin;
  document.getElementById('areaMax').textContent=t.areaMax;
  const pct=((state.area-50)/200)*100;
  document.getElementById('areaSlider').style.setProperty('--pct',pct+'%');

  // CITY SELECT
  const cs=document.getElementById('citySelect');
  const prev=cs.value||state.cityKey;
  cs.innerHTML=Object.keys(CITIES).map(k=>`<option value="${k}"${k===state.cityKey?' selected':''}>${cl[k]}</option>`).join('');

  // EPC SELECT
  document.getElementById('epcLabel').textContent=t.epcLabel;
  document.getElementById('epcSelect').innerHTML=Object.keys(EPC).map(k=>
    `<option value="${k}"${k===state.epcKey?' selected':''}>${k==='A'?'A / A+':k} — ${EPC[k].bc} ${t.epcUnit}</option>`
  ).join('');

  // PROJECT
  document.getElementById('projectLabel').textContent=t.projectLabel;
  document.getElementById('cityLabel').textContent=t.cityLabel;
  document.getElementById('btnRenovation').textContent=t.renovation;
  document.getElementById('btnNewbuild').textContent=t.newbuild;
  document.getElementById('btnRenovation').className='proj-btn'+(state.scenario==='renovation'?' active':'');
  document.getElementById('btnNewbuild').className='proj-btn'+(state.scenario==='newbuild'?' active':'');

  // PANELS
  document.getElementById('panelNum').textContent=r.panels;
  document.getElementById('panelsTitle').textContent=t.panelsTitle;
  document.getElementById('panelsSub').textContent=t.panelsSub(cl[state.cityKey],state.epcKey,state.area);

  // CAPEX
  document.getElementById('sectionCapex').textContent=t.sectionCapex;
  document.getElementById('gasLabel').textContent=t.gasLabel;
  document.getElementById('gasName').textContent=t.gasName;
  document.getElementById('gasCapexVal').textContent=eur(r.gasC);
  document.getElementById('gasSub').textContent=typeof t.gasSub==='function'?t.gasSub(state.scenario):t.gasSub;
  document.getElementById('hpLabel').textContent=t.hpLabel;
  document.getElementById('hpName').textContent=t.hpName;
  document.getElementById('hpCapexVal').textContent=eur(r.hpC);
  document.getElementById('hpSub').textContent=typeof t.hpSub==='function'?t.hpSub(state.scenario):t.hpSub;
  document.getElementById('hybroLabel').textContent=t.hybroLabel;
  document.getElementById('hybroName').textContent=t.hybroName;
  document.getElementById('hybroCapexVal').textContent=eur(r.hybroC);
  document.getElementById('hybroSub').textContent=t.hybroSub(r.panels);

  // OPEX
  document.getElementById('sectionOpex').textContent=t.sectionOpex;
  document.getElementById('gasSysName').textContent=t.gasSysName;
  document.getElementById('gasSysSub').textContent=t.gasSysSub(fmt(r.gasKwh));
  document.getElementById('gasOpexVal').textContent=eur(r.costGas);
  document.getElementById('perYear1').textContent=t.perYear;
  document.getElementById('hpSysName').textContent=t.hpSysName;
  document.getElementById('hpSysSub').textContent=t.hpSysSub(state.cop,fmt(r.hpKwh));
  document.getElementById('hpOpexVal').textContent=eur(r.costHp);
  document.getElementById('perYear2').textContent=t.perYear;
  document.getElementById('hybroSysName').textContent=t.hybroSysName;
  document.getElementById('hybroSysSub').textContent=t.hybroSysSub(fmt(r.hybroKwh),(state.elecTariff*.7).toFixed(3),state.useSmartTariff);
  document.getElementById('hybroOpexVal').textContent=eur(r.costHybro);
  document.getElementById('perYear3').textContent=t.perYear;

  // CHART
  document.getElementById('sectionTco').textContent=t.sectionTco;
  document.getElementById('legendGas').textContent=t.chartGas;
  document.getElementById('legendHp').textContent=t.chartHp;
  document.getElementById('legendHybro').textContent=t.chartHybro;
  buildChart(r.tco,t);

  // CONCLUSION
  document.getElementById('conclusionTitle').textContent=t.conclusionTitle;
  document.getElementById('conclusionText').innerHTML=t.conclusionText(eur(r.save),r.yrs);
  document.getElementById('pillsWrap').innerHTML=t.pills(state.useSmartTariff)
    .map(p=>`<span class="pill">${p}</span>`).join('');

  // ADVANCED
  document.getElementById('advBtn').textContent=t.advBtn;
  document.getElementById('sectionAdv').textContent=t.sectionAdv;
  document.getElementById('elecTariffLabel').textContent=t.elecTariffLabel;
  document.getElementById('gasTariffLabel').textContent=t.gasTariffLabel;
  document.getElementById('copLabel').textContent=t.copLabel;
  document.getElementById('inflLabel').textContent=t.inflLabel;

  // FOOTER
  document.getElementById('footer').textContent=t.footer;
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
function setLang(l){state.lang=l;render();}
function setScenario(s){state.scenario=s;render();}
function toggleAdv(){
  const c=document.getElementById('advContent');
  const a=document.getElementById('advArrow');
  const open=c.classList.toggle('open');
  a.style.transform=open?'rotate(90deg)':'rotate(0deg)';
}

document.getElementById('smartToggle').addEventListener('click',()=>{state.useSmartTariff=!state.useSmartTariff;render();});
document.getElementById('areaSlider').addEventListener('input',e=>{state.area=Number(e.target.value);render();});
document.getElementById('citySelect').addEventListener('change',e=>{state.cityKey=e.target.value;render();});
document.getElementById('epcSelect').addEventListener('change',e=>{state.epcKey=e.target.value;render();});
document.getElementById('elecTariffInput').addEventListener('input',e=>{state.elecTariff=Number(e.target.value);render();});
document.getElementById('gasTariffInput').addEventListener('input',e=>{state.gasTariff=Number(e.target.value);render();});
document.getElementById('copInput').addEventListener('input',e=>{state.cop=Number(e.target.value);render();});
document.getElementById('inflInput').addEventListener('input',e=>{state.inflationRate=Number(e.target.value);render();});

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
